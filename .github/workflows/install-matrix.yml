name: install-matrix

# C2 (SPEC docs/specs/v26-72-install-matrix-ci.md) — fresh-env 설치 매트릭스.
# 실제 배포 진입점(npm pack 타르볼 = files 화이트리스트 + prepare 빌드)을
# fresh 러너에서 설치 검증 → First-Run Success >=95% 회귀 게이트.
#
# 정책: 기존 `ci`(test.yml)와 독립. 태그-온리(v*) + 수동 dispatch (test-policy.md 정합).
# 범위: core 설치(templates/CLAUDE.md/.installed-tracks/.mcp.json) 단언. external 자산 실설치
#   매트릭스는 Docker E2E(test/docker/) 담당 — 본 워크플로우는 external 비실패(non-fatal) 가정.
#
# 구조:
#   pack            — npm pack 으로 타르볼 1회 빌드(prepare) → artifact (모든 install job 이 동일 surface).
#   install-matrix  — OS{ubuntu,macos} × Node{20,22} × pm{npm 전체 + pnpm subset}. 타르볼 설치 + core 단언.
#   multi-track     — 1 env 에서 여러 track core 설치 단언 (cross-track).
#   fail-loud       — unknown track → 비정상 종료 (Rule 12 — 게이트가 실패를 잡는지).
#
# NOTE: `npx github:` 문서 명령 smoke 는 제거됨 — npm 10(Node 20/22 LTS)이 git-dep pack 시
#   "GitFetcher requires an Arborist constructor" 로 실패(npm 버그, dist/prepare 무관). 근본 해결 =
#   npm registry publish → `npx @uzysjung/claude-harness`. publish CR 에서 registry-install smoke 추가 예정.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: install-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack:
    name: pack (npm pack → tarball artifact)
    runs-on: ubuntu-latest
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # npm pack 은 prepare(빌드) + files 화이트리스트 검증. dist 는 gitignore 라 prepare 가 빌드.
      - name: npm pack (prepare build + files whitelist)
        id: pack
        shell: bash
        run: |
          npm ci
          tarball=$(npm pack --silent | tail -1)
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "packed: ${tarball}"
      - uses: actions/upload-artifact@v4
        with:
          name: harness-tarball
          path: ${{ steps.pack.outputs.tarball }}
          retention-days: 1
          if-no-files-found: error

  install-matrix:
    name: install (${{ matrix.os }} · node${{ matrix.node }} · ${{ matrix.pm }})
    needs: pack
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
        pm: [npm]
        # pnpm 은 대표 subset (러너 시간 절약, A2=진입점 검증 핵심만).
        include:
          - os: ubuntu-latest
            node: 20
            pm: pnpm
          - os: macos-latest
            node: 22
            pm: pnpm
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/download-artifact@v4
        with:
          name: harness-tarball
      - name: install via ${{ matrix.pm }} + assert core files (AC1/AC2/AC3)
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(ls ./*.tgz | head -1)"
          tarball="$(cd "$(dirname "$tarball")" && pwd)/$(basename "$tarball")"
          proj="$(mktemp -d)"
          work="$(mktemp -d)"
          cd "$work"
          if [ "${{ matrix.pm }}" = "pnpm" ]; then
            corepack enable
            corepack prepare pnpm@9 --activate
            pnpm init >/dev/null 2>&1 || true
            pnpm add "$tarball"
            pnpm exec claude-harness install --track tooling --project-dir "$proj"
          else
            npm init -y >/dev/null
            npm install "$tarball"
            npx claude-harness install --track tooling --project-dir "$proj"
          fi
          echo "--- assert core files (First-Run Success — 수동 개입 0) ---"
          for f in .claude/CLAUDE.md .claude/.installed-tracks .mcp.json; do
            test -f "$proj/$f" || { echo "MISSING $f"; exit 1; }
          done
          echo "| ${{ matrix.os }} | node${{ matrix.node }} | ${{ matrix.pm }} | ✅ PASS |" >> "$GITHUB_STEP_SUMMARY"

  multi-track:
    name: multi-track core (ubuntu · node20 · npm)
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: harness-tarball
      - name: install several tracks + assert core (cross-track)
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(ls ./*.tgz | head -1)"
          tarball="$(cd "$(dirname "$tarball")" && pwd)/$(basename "$tarball")"
          work="$(mktemp -d)"; cd "$work"; npm init -y >/dev/null; npm install "$tarball"
          {
            echo "### multi-track core install"
            echo "| track | core files |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"
          for track in tooling executive data; do
            proj="$(mktemp -d)"
            npx claude-harness install --track "$track" --project-dir "$proj"
            for f in .claude/CLAUDE.md .claude/.installed-tracks .mcp.json; do
              test -f "$proj/$f" || { echo "MISSING $track:$f"; exit 1; }
            done
            echo "| $track | ✅ |" >> "$GITHUB_STEP_SUMMARY"
          done

  fail-loud:
    name: fail-loud (unknown track → non-zero)
    needs: pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: harness-tarball
      - name: assert install fails loud on unknown track (Rule 12)
        shell: bash
        run: |
          set -uo pipefail
          tarball="$(ls ./*.tgz | head -1)"
          tarball="$(cd "$(dirname "$tarball")" && pwd)/$(basename "$tarball")"
          work="$(mktemp -d)"; cd "$work"; npm init -y >/dev/null; npm install "$tarball"
          if npx claude-harness install --track NONEXISTENT-TRACK --project-dir "$(mktemp -d)"; then
            echo "FAIL: unknown track should exit non-zero (게이트가 실패를 못 잡음)"
            exit 1
          fi
          echo "PASS: unknown track exits non-zero (fail-loud 확인)"
