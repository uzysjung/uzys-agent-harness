name: install-matrix

# C2 (SPEC docs/specs/v26-72-install-matrix-ci.md) — fresh-env 설치 매트릭스.
# 실제 배포 진입점(npm pack 타르볼 = files 화이트리스트 + prepare 빌드)을 fresh 러너에서
# 설치 검증 → First-Run Success >=95% 회귀 게이트.
#
# 정책: 기존 `ci`(test.yml)와 독립. 태그-온리(v*) + 수동 dispatch (test-policy.md 정합).
# 범위: core 설치(templates/CLAUDE.md/.mcp.json) 단언. external 자산 실설치 매트릭스는
#   Docker E2E(test/docker/) 담당 — 본 워크플로우는 external 비실패(non-fatal) 가정, core 만 단언.
#
# Phase 1 (현재): 단일 combo (ubuntu / node 20 / npm). Checkpoint 1 통과 후 Phase 2 에서
#   os/node 매트릭스 fan-out, Phase 3 에서 pnpm 차원 추가.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: install-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pack-install:
    name: pack+install (${{ matrix.os }} · node${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [20]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # npm pack = prepare(빌드) + files 화이트리스트 검증. dist 는 gitignore 라 prepare 가 빌드.
      - name: npm pack (prepare build + files whitelist)
        id: pack
        shell: bash
        run: |
          npm ci
          tarball=$(npm pack --silent | tail -1)
          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "packed: ${tarball}"

      # 실제 사용자처럼 타르볼을 fresh 프로젝트에 설치 후 bin 실행 → core 파일 단언 (AC1).
      - name: install tarball into fresh project + assert core files (AC1)
        shell: bash
        run: |
          set -euo pipefail
          runner_proj=$(mktemp -d)   # 타르볼을 dependency 로 설치할 임시 프로젝트
          target=$(mktemp -d)        # claude-harness 가 자산을 설치할 대상 디렉토리
          cd "$runner_proj"
          npm init -y >/dev/null
          npm install "${GITHUB_WORKSPACE}/${{ steps.pack.outputs.tarball }}"
          # 비대화형 core 설치 (scope=project default → 글로벌 미오염). external 은 non-fatal.
          npx claude-harness install --track tooling --project-dir "$target"
          echo "--- assert core files (First-Run Success) ---"
          test -f "$target/.claude/CLAUDE.md"      || { echo "MISSING .claude/CLAUDE.md"; exit 1; }
          test -f "$target/.claude/.installed-tracks" || { echo "MISSING .claude/.installed-tracks"; exit 1; }
          test -f "$target/.mcp.json"              || { echo "MISSING .mcp.json"; exit 1; }
          echo "PASS: core files present (${{ matrix.os }} · node${{ matrix.node }})"
