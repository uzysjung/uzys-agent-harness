name: Deploy Pages

# Actions-based Pages deploy (bypasses the legacy build queue).
# Publishes only the landing page + llms.txt as the site root.

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "llms.txt"
      - "robots.txt"
      - "sitemap.xml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (landing + llms.txt only)
        run: |
          mkdir -p _site
          cp index.html llms.txt robots.txt sitemap.xml _site/
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
