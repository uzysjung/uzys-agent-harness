name: ci

# 검증 정책 (2026-05-31): 로컬 `npm run ci` 가 1차 게이트 (.claude/rules/test-policy.md).
# GitHub Actions 는 push/PR 마다 돌지 않고 릴리스 태그(v*) push 시에만 최종 검증 — Actions 사용량 최소화.
# 수동 재실행이 필요하면 workflow_dispatch 로 트리거.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: TypeScript CI (typecheck + lint + test:coverage + build)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Run CI pipeline
        run: npm run ci

      # v26.72.0 — dist 를 git 에 커밋(npx github: 즉시 실행). 커밋된 dist 가 src 와 drift 안 했는지 강제.
      #   npm run ci 가 dist 를 빌드 → 커밋본과 다르면 재빌드/재커밋 누락 (빌드는 결정적).
      - name: Verify committed dist is fresh (no drift)
        shell: bash
        run: |
          # npm run ci 가 dist 를 빌드. 커밋본과 다르면 drift (빌드 결정적). --porcelain 으로 portable 검사.
          if [ -n "$(git status --porcelain -- dist)" ]; then
            echo "ERROR: 커밋된 dist 가 src 와 불일치. 로컬에서 'npm run build' 후 dist 를 재커밋하세요." >&2
            git status --porcelain -- dist >&2
            exit 1
          fi
          echo "OK: committed dist == fresh build (no drift)"

      - name: Smoke test (install --track tooling into temp dir)
        shell: bash
        run: |
          tmp=$(mktemp -d)
          node dist/index.js install --track tooling --project-dir "$tmp"
          test -f "$tmp/.claude/CLAUDE.md"
          test -f "$tmp/.claude/.installed-tracks"
          test -f "$tmp/.mcp.json"
          rm -rf "$tmp"
