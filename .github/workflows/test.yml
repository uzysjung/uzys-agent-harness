name: ci

# 검증 정책 (2026-05-31): 로컬 `npm run ci` 가 1차 게이트 (.claude/rules/test-policy.md).
# GitHub Actions 는 push/PR 마다 돌지 않고 릴리스 태그(v*) push 시에만 최종 검증 — Actions 사용량 최소화.
# 수동 재실행이 필요하면 workflow_dispatch 로 트리거.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: TypeScript CI (typecheck + lint + test:coverage + build)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Run CI pipeline
        run: npm run ci

      - name: Smoke test (install --track tooling into temp dir)
        shell: bash
        run: |
          tmp=$(mktemp -d)
          node dist/index.js install --track tooling --project-dir "$tmp"
          test -f "$tmp/.claude/CLAUDE.md"
          test -f "$tmp/.claude/.installed-tracks"
          test -f "$tmp/.mcp.json"
          rm -rf "$tmp"
